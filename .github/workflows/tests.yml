name: Automatisation des tests

on: push

jobs:

  Compilation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer dépendances
        run: sudo apt-get update && sudo apt-get install -y cmake make gcc

      - name: Compilation
        run: |
          mkdir build
          cd build
          cmake ..
          make

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake make gcc
      - run: |
          mkdir build && cd build
          cmake .. && make
          ./src/calculator add 10 5

  Test_Sub:
    runs-on: ubuntu-latest
    needs: Compilation

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake make gcc
      - run: |
          mkdir build && cd build
          cmake .. && make
          ./src/calculator sub 3 2

  Test_Mul:
    runs-on: ubuntu-latest
    needs: Compilation

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake make gcc
      - run: |
          mkdir build && cd build
          cmake .. && make
          ./src/calculator mul 5 5

  Test_Div:
    runs-on: ubuntu-latest
    needs: Compilation

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake make gcc
      - run: |
          mkdir build && cd build
          cmake .. && make
          ./src/calculator div 10 2

  Test_Car:
    runs-on: ubuntu-latest
    needs: Compilation

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake make gcc
      - run: |
          mkdir build && cd build
          cmake .. && make
          ./src/calculator car 5

  Deploy:
    runs-on: ubuntu-latest
    needs: [Test_Add, Test_Sub, Test_Mul, Test_Div, Test_Car]

    steps:
      - name: Déploiement
        run: echo "Déploiement de la solution"
